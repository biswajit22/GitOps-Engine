apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: workload-clusters-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
  - clusters:
      selector:
        matchExpressions:
        - key: argocd.argoproj.io/secret-type
          operator: In
          values:
          - cluster
        - key: environment
          operator: In
          values:
          - dev
          - prod
  template:
    metadata:
      name: '{{.name}}-sample-microservice'
    spec:
      project: default
      source:
        repoURL: 'https://github.com/your-username/gitops-portfolio.git'
        targetRevision: HEAD
        path: 'apps/sample-microservice'
        helm:
          valueFiles:
          - 'values-{{.metadata.labels.environment}}.yaml'
      destination:
        server: '{{.server}}'
        namespace: sample-app
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
